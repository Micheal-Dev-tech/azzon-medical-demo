<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage | Azzon Medical Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .stage-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid #cbd5e1; }
        .stage-active { background: #3b82f6; border-color: #3b82f6; box-shadow: 0 0 8px #3b82f6; }
        .stage-done { background: #22c55e; border-color: #22c55e; }
        canvas { border: 2px dashed #cbd5e1; background: #fff; width: 100%; height: 150px; touch-action: none; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 p-4 font-sans text-slate-900">
    <nav class="bg-slate-900 text-white p-4 rounded-xl mb-6 flex justify-between items-center shadow-lg">
        <h1 class="font-bold text-sm uppercase tracking-tighter">Azzon Medical <span class="text-blue-400 font-normal">Vantage v1.0</span></h1>
        <div class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div>
    </nav>

    <div class="grid grid-cols-2 gap-3 mb-6">
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Revenue</p>
            <p class="text-xl font-black">₦214,500</p>
        </div>
        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <p class="text-[10px] font-bold text-slate-400 uppercase">Queue</p>
            <p class="text-xl font-black text-blue-600">18</p>
        </div>
    </div>

    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-6">
        <h2 class="font-bold text-sm mb-4">8-Stage Workflow Engine</h2>
        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-100">
            <div class="flex gap-2">
                <div class="stage-dot stage-done"></div>
                <div class="stage-dot stage-done"></div>
                <div class="stage-dot stage-active"></div>
                <div class="stage-dot"></div>
                <div class="stage-dot"></div>
                <div class="stage-dot"></div>
                <div class="stage-dot"></div>
                <div class="stage-dot"></div>
            </div>
            <span class="text-[9px] font-black text-blue-600">STAGE 3: LAB</span>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
        <h3 class="font-bold text-sm mb-1">Patient Sign-off</h3>
        <p class="text-[10px] text-slate-400 mb-4">Digital Verification Required</p>
        <canvas id="sig-canvas"></canvas>
        <button class="w-full bg-slate-900 text-white py-3 rounded-xl mt-4 font-bold text-xs">DISPATCH & SAVE</button>
    </div>

    <script>
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        function start(e) { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); }
        function draw(e) { if (!drawing) return; e.preventDefault(); const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
        function end() { drawing = false; }
        canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', end);
        canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', end);
        ctx.lineWidth = 2; ctx.strokeStyle = "#1e293b";
    </script>
</body>
</html>
